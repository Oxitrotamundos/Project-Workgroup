name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      NODE_ENV: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Nada dispara esto automáticamente en un checkout limpio (sin postinstall
      # hook); apps/api no compila ni lintea sin el cliente generado.
      - run: pnpm --filter @project-workgroup/api exec prisma generate

      # El script raíz `lint` no antepone estos builds (a diferencia de `build`),
      # y el lint de apps/api usa type-aware linting que necesita ambos dist
      # (apps/api importa de @project-workgroup/shared y @project-workgroup/mcp).
      - run: pnpm run build:shared

      - run: pnpm run build:mcp

      - run: pnpm run lint

      - run: pnpm run build

      - run: pnpm run test
